<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Muscu</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--accent:#c8f560;--accent-dark:#8ab030;--text:#f0f0f0;--muted:#555;--muted2:#888}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;max-width:500px;margin:0 auto;padding-bottom:48px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-top:10px}
.header-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:3px}
.streak{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:'DM Mono',monospace;font-size:12px;color:var(--accent)}

/* CALENDAR */
.calendar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:20px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-size:14px;font-weight:500}
.cal-nav{background:none;border:1px solid var(--border);color:var(--muted2);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-align:center;padding:2px 0;text-transform:uppercase}
.cal-day{height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-family:'DM Mono',monospace;color:var(--muted);position:relative;cursor:default}
.cal-day.workout{color:var(--text);cursor:pointer}
.cal-day.workout::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--border)}
.cal-day.done{color:var(--accent)}
.cal-day.done::after{background:var(--accent)}
.cal-day.today{background:var(--surface2);color:var(--text);font-weight:600}
.cal-day.selected{background:var(--accent);color:#0f0f0f;font-weight:600}
.cal-day.selected::after{display:none}
.cal-day.other-month{opacity:.25}

/* SESSION PILLS */
.session-pills{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.pill{background:var(--surface);border:1px solid var(--border);color:var(--muted2);padding:10px 6px;border-radius:8px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;text-align:center;line-height:1.5}
.pill.active{background:var(--accent);border-color:var(--accent);color:#0f0f0f;font-weight:600}
.pill-label{font-size:9px;opacity:.7;display:block;margin-top:2px}

/* DATE ROW */
.date-row{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.date-row input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;flex:1;-webkit-appearance:none}
.save-btn{background:var(--accent);color:#0f0f0f;border:none;padding:8px 16px;border-radius:6px;font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap}

/* EXERCISES */
.exercise{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
.ex-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.ex-name{font-size:13px;font-weight:500;line-height:1.3}
.ex-meta{font-size:11px;color:var(--muted2);font-family:'DM Mono',monospace;margin-top:3px}
.ex-toggle{color:var(--muted);font-size:20px;transition:.2s;flex-shrink:0;margin-left:8px}
.ex-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.ex-body.open{display:block}

/* SETS */
.sets-grid{display:grid;grid-template-columns:28px 1fr 1fr;gap:6px;align-items:center;margin-top:10px}
.col-label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-align:center}
.col-label:first-child{text-align:left}
.set-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);background:var(--surface2);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500}
.set-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 6px;border-radius:6px;font-size:15px;font-family:'DM Mono',monospace;text-align:center;width:100%;-webkit-appearance:none;appearance:none}
.set-input:focus{outline:none;border-color:var(--accent)}
.set-input.filled{border-color:#3a6010;background:#1a2e08}
.prev-row{display:contents}
.prev-val{font-size:10px;color:var(--muted2);font-family:'DM Mono',monospace;text-align:center;padding:0 2px}
.prev-val:first-child{text-align:left;color:var(--muted)}

/* NOTE */
.note{font-size:11px;color:var(--muted2);margin-top:10px;line-height:1.6;font-style:italic;border-left:2px solid var(--border);padding-left:8px}

/* CARDIO */
.cardio{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;font-size:13px;color:var(--muted2)}
.cardio strong{color:var(--text);font-weight:500}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#0f0f0f;padding:10px 22px;border-radius:20px;font-weight:600;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:99;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Muscu</div>
  <div class="streak" id="streakBadge">🔥 0 séances</div>
</div>

<div class="calendar">
  <div class="cal-header">
    <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
    <div class="cal-month" id="calTitle"></div>
    <button class="cal-nav" onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="session-pills">
  <button class="pill active" onclick="loadSession(0)">💪 Séance 1<span class="pill-label">Haut</span></button>
  <button class="pill" onclick="loadSession(1)">🦵 Séance 2<span class="pill-label">Bas</span></button>
  <button class="pill" onclick="loadSession(2)">🏋️ Séance 3<span class="pill-label">Full Body</span></button>
</div>

<div class="date-row">
  <input type="date" id="sessionDate">
  <button class="save-btn" onclick="saveSession()">Sauvegarder</button>
</div>

<div id="exerciseList"></div>
<div class="toast" id="toast"></div>

<script>
const PROGRAM = [
  {name:"Séance 1 – Haut",exercises:[
    {name:"Développé couché barre / guidée",sets:4,reps:"8",rest:"2-3 min",note:"Échauffement : 1x10 vide + 1x5 moyen. Si tu peux repartir → monte le poids"},
    {name:"Rowing haltère ou barre",sets:4,reps:"8",rest:"2-3 min",note:"Dos neutre. Même règle de progression"},
    {name:"Tractions négatives + élastique",sets:4,reps:"4",rest:"2 min",note:"Élastique pour atteindre 4 reps max. Réduis l'élastique quand tu peux faire plus de 4 reps proprement"},
    {name:"Élévations latérales poulie",sets:3,reps:"10",rest:"1 min",note:"Arrête-toi 1-2 reps avant l'échec"},
    {name:"Curl biceps",sets:3,reps:"10",rest:"1 min",note:"Isolation — idem"},
    {name:"Pompes",sets:4,reps:"max",rest:"1 min",note:"Arrête-toi 2 reps avant l'échec"},
    {name:"Shrug haltères",sets:3,reps:"10",rest:"1 min",note:"Monte le poids si tu passes la règle"},
    {name:"Extension triceps poulie",sets:3,reps:"10",rest:"1 min",note:"Arrête-toi 1-2 reps avant l'échec"},
    {name:"Pullover poulie",sets:3,reps:"10",rest:"1 min",note:"Idem"},
    {name:"Circuit abdos",sets:1,reps:"—",rest:"—",note:"1 circuit"},
    {name:"Cardio — 20 min",cardio:true,note:"Marche / incliné / rameur / vélo"},
  ]},
  {name:"Séance 2 – Bas",exercises:[
    {name:"Squat barre / guidée",sets:4,reps:"8",rest:"2-3 min",note:"Échauffement : 1x10 vide + 1x5 moyen. Si tu peux repartir → monte le poids"},
    {name:"Leg extension",sets:3,reps:"10",rest:"1 min",note:"Arrête-toi 1-2 reps avant l'échec"},
    {name:"Leg curl",sets:3,reps:"10",rest:"1 min",note:"Isolation — idem"},
    {name:"Extensions mollets",sets:4,reps:"10",rest:"1 min",note:"Pause 1s en haut. Monte le poids si tu passes la règle"},
    {name:"Squats sautés",sets:3,reps:"10",rest:"1 min",note:"Sans poids, explosif"},
    {name:"Circuit gainage",sets:1,reps:"—",rest:"—",note:"1 circuit"},
    {name:"Cardio — 20 min",cardio:true,note:"Marche / incliné / rameur / vélo"},
  ]},
  {name:"Séance 3 – Full Body",exercises:[
    {name:"Développé militaire",sets:4,reps:"8",rest:"2-3 min",note:"Échauffement : 1x10 vide + 1x5 moyen. Si tu peux repartir → monte le poids"},
    {name:"Squat barre / guidée",sets:4,reps:"8",rest:"2-3 min",note:"Même règle"},
    {name:"Rowing haltère ou barre",sets:4,reps:"8",rest:"2-3 min",note:"Dos neutre. Même règle"},
    {name:"Écarté poulie bas → haut",sets:3,reps:"10",rest:"1 min",note:"Ciblage haut des pecs. Monte le poids si tu passes la règle"},
    {name:"Tractions négatives + élastique",sets:4,reps:"4",rest:"2 min",note:"Élastique pour atteindre 4 reps max. Réduis l'élastique quand tu peux faire plus de 4 reps proprement"},
    {name:"Curl marteau",sets:3,reps:"10",rest:"1 min",note:"Arrête-toi 1-2 reps avant l'échec"},
    {name:"Dips",sets:3,reps:"max",rest:"1 min",note:"Arrête-toi 2 reps avant l'échec"},
    {name:"Leg extension",sets:3,reps:"10",rest:"1 min",note:"Arrête-toi 1-2 reps avant l'échec"},
    {name:"Squats sautés (arrêt bas)",sets:3,reps:"8",rest:"1 min",note:"Sans poids"},
    {name:"Cardio — 20 min",cardio:true,note:"Marche / incliné / rameur / vélo"},
  ]}
];

// Séquence L/M/V → sessions 0,1,2 en rotation
const WORKOUT_DAYS = [1,3,5]; // lundi=1, mercredi=3, vendredi=5

let currentSession = 0;
let calYear, calMonth;

function getToday() {
  return document.getElementById('sessionDate').value || todayStr();
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isWorkoutDay(date) {
  return WORKOUT_DAYS.includes(date.getDay());
}

function getSessionForDate(date) {
  // Compte combien de jours d'entraînement se sont écoulés depuis une date de référence
  const ref = new Date(2025,0,6); // lundi 6 jan 2025 = séance 0
  let count = 0;
  const d = new Date(ref);
  while (d < date) {
    if (isWorkoutDay(d)) count++;
    d.setDate(d.getDate()+1);
  }
  return count % 3;
}

function isSavedDate(dateStr) {
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    const m = k.match(/^s(\d)_(\d{4}-\d{2}-\d{2})$/);
    if (m && m[2] === dateStr) return true;
  }
  return false;
}

// CALENDAR
function renderCalendar() {
  const now = new Date();
  if (calYear === undefined) { calYear = now.getFullYear(); calMonth = now.getMonth(); }
  const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  document.getElementById('calTitle').textContent = `${months[calMonth]} ${calYear}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['L','M','M','J','V','S','D'].forEach(l => {
    const el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = l;
    grid.appendChild(el);
  });

  const first = new Date(calYear, calMonth, 1);
  const last = new Date(calYear, calMonth+1, 0);
  // Start on Monday
  let startDow = first.getDay(); // 0=sun
  startDow = startDow === 0 ? 6 : startDow - 1;

  const selectedDate = getToday();
  const todayS = todayStr();

  // Previous month padding
  for (let i = 0; i < startDow; i++) {
    const d = new Date(calYear, calMonth, -startDow+1+i);
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = d.getDate();
    grid.appendChild(el);
  }

  for (let d = 1; d <= last.getDate(); d++) {
    const date = new Date(calYear, calMonth, d);
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const el = document.createElement('div');
    let cls = 'cal-day';
    if (isWorkoutDay(date)) cls += ' workout';
    if (isSavedDate(dateStr)) cls += ' done';
    if (dateStr === todayS) cls += ' today';
    if (dateStr === selectedDate) cls += ' selected';
    el.className = cls;
    el.textContent = d;
    if (isWorkoutDay(date)) {
      el.onclick = () => selectDate(dateStr, date);
    }
    grid.appendChild(el);
  }

  // Streak
  updateStreak();
}

function selectDate(dateStr, date) {
  document.getElementById('sessionDate').value = dateStr;
  currentSession = getSessionForDate(date);
  document.querySelectorAll('.pill').forEach((b,i) => b.classList.toggle('active', i===currentSession));
  renderCalendar();
  renderExercises();
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function updateStreak() {
  let streak = 0;
  const d = new Date();
  // Go back day by day
  for (let i = 0; i < 365; i++) {
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (isWorkoutDay(d)) {
      if (isSavedDate(ds)) streak++;
      else if (ds !== todayStr()) break;
    }
    d.setDate(d.getDate()-1);
  }
  document.getElementById('streakBadge').textContent = streak > 0 ? `🔥 ${streak} séances` : `⚡ 0 séances`;
}

// Get previous session data for same session type
function getPrevData(sessionIdx, exIdx) {
  const dates = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    const m = k.match(new RegExp(`^s${sessionIdx}_(\\d{4}-\\d{2}-\\d{2})$`));
    if (m) dates.push(m[1]);
  }
  dates.sort((a,b) => b.localeCompare(a));
  const today = getToday();
  const prev = dates.find(d => d < today);
  if (!prev) return null;
  return JSON.parse(localStorage.getItem(`s${sessionIdx}_${prev}`) || '{}');
}

function loadSession(idx) {
  currentSession = idx;
  document.querySelectorAll('.pill').forEach((b,i) => b.classList.toggle('active', i===idx));
  renderExercises();
}

function renderExercises() {
  const list = document.getElementById('exerciseList');
  const session = PROGRAM[currentSession];
  const today = getToday();
  const savedKey = `s${currentSession}_${today}`;
  const saved = JSON.parse(localStorage.getItem(savedKey)||'{}');

  list.innerHTML = '';
  session.exercises.forEach((ex, ei) => {
    if (ex.cardio) {
      list.innerHTML += `<div class="cardio"><strong>🏃 ${ex.name}</strong> — ${ex.note}</div>`;
      return;
    }

    const prevData = getPrevData(currentSession, ei);

    const rows = [];
    for (let s = 0; s < ex.sets; s++) {
      const wVal = saved[`${ei}_${s}_w`] || '';
      const rVal = saved[`${ei}_${s}_r`] || '';
      const pW = prevData ? (prevData[`${ei}_${s}_w`] || '') : '';
      const pR = prevData ? (prevData[`${ei}_${s}_r`] || '') : '';
      rows.push(`
        <div class="set-num">${s+1}</div>
        <input class="set-input ${wVal?'filled':''}" type="number" inputmode="decimal" placeholder="${pW ? pW+'kg' : 'kg'}" value="${wVal}"
          onchange="autoSave(${ei},${s},'w',this.value)" oninput="this.classList.toggle('filled',!!this.value)">
        <input class="set-input ${rVal?'filled':''}" type="number" inputmode="numeric" placeholder="${pR ? pR : ex.reps}" value="${rVal}"
          onchange="autoSave(${ei},${s},'r',this.value)" oninput="this.classList.toggle('filled',!!this.value)">
      `);
    }

    const prevLine = prevData ? (() => {
      const ws = [];
      for (let s = 0; s < ex.sets; s++) { const v = prevData[`${ei}_${s}_w`]; if(v) ws.push(v+'kg'); }
      return ws.length ? `<div class="note" style="margin-top:8px;border-left-color:var(--accent-dark);color:var(--muted2)">Dernière fois : ${ws.join(' · ')}</div>` : '';
    })() : '';

    list.innerHTML += `
      <div class="exercise">
        <div class="ex-header" onclick="toggleEx(this)">
          <div style="flex:1">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-meta">${ex.sets}×${ex.reps} · repos ${ex.rest}</div>
          </div>
          <div class="ex-toggle">›</div>
        </div>
        <div class="ex-body">
          <div class="sets-grid">
            <div class="col-label">série</div>
            <div class="col-label">poids</div>
            <div class="col-label">reps</div>
            ${rows.join('')}
          </div>
          ${prevLine}
          <div class="note">${ex.note}</div>
        </div>
      </div>`;
  });
}

function toggleEx(header) {
  const body = header.nextElementSibling;
  const toggle = header.querySelector('.ex-toggle');
  const isOpen = body.classList.toggle('open');
  toggle.style.transform = isOpen ? 'rotate(90deg)' : '';
}

function autoSave(ei, si, type, val) {
  const key = `s${currentSession}_${getToday()}`;
  const saved = JSON.parse(localStorage.getItem(key)||'{}');
  saved[`${ei}_${si}_${type}`] = val;
  localStorage.setItem(key, JSON.stringify(saved));
}

function saveSession() {
  renderCalendar();
  showToast('Séance sauvegardée ✓');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
const now = new Date();
document.getElementById('sessionDate').value = todayStr();
document.getElementById('sessionDate').addEventListener('change', () => {
  renderCalendar();
  renderExercises();
});

// Auto-select session based on today
if (isWorkoutDay(now)) {
  currentSession = getSessionForDate(now);
  document.querySelectorAll('.pill').forEach((b,i) => b.classList.toggle('active', i===currentSession));
}

renderCalendar();
renderExercises();
</script>
</body>
</html>
